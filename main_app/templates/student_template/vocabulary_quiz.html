{% extends 'main_app/base.html' %}
{% load static %}
{% block page_title %}{{ page_title }}{% endblock %}

{% block custom_css %}
<style>
.quiz-page {
  --c-bg: #F4F7FB;
  --c-surface: #FFFFFF;
  --c-text: #0F172A;
  --c-muted: #64748B;
  --c-border: #E6ECF5;
  --c-royal: #1F4FD9;
  --c-navy-a: #0F1F5C;
  --c-navy-b: #1340A8;
  --c-success: #10B981;
  --c-danger: #EF4444;
  --c-warning: #F59E0B;
  background: var(--c-bg);
  margin: -24px -24px -24px -24px;
  padding: 18px 16px 48px;
  min-height: 100%;
  font-family: 'Inter', sans-serif;
  color: var(--c-text);
}
@media (min-width: 640px) {
  .quiz-page { padding: 24px 28px 60px; margin: -24px; }
}

/* ── Progress bar ─────────────────────────────────────────── */
.quiz-progress-wrap {
  background: var(--c-surface);
  border-radius: 14px;
  border: 1px solid var(--c-border);
  padding: 14px 20px;
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  gap: 14px;
}
.quiz-prog-bar-bg {
  flex: 1;
  height: 8px;
  background: var(--c-border);
  border-radius: 100px;
  overflow: hidden;
}
.quiz-prog-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--c-navy-a), var(--c-royal));
  border-radius: 100px;
  transition: width .4s ease;
}
.quiz-score-label { font-size: 13px; font-weight: 700; color: var(--c-text); white-space: nowrap; }

/* ── Quiz card ───────────────────────────────────────────── */
.quiz-card {
  background: var(--c-surface);
  border-radius: 20px;
  border: 1px solid var(--c-border);
  box-shadow: 0 2px 8px rgba(27,63,122,.07);
  padding: 28px 24px 22px;
  max-width: 640px;
  margin: 0 auto 20px;
}
.quiz-q-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .6px; color: var(--c-muted); margin-bottom: 10px; }
.quiz-word { font-size: 34px; font-weight: 900; margin-bottom: 20px; letter-spacing: -0.5px; }
.quiz-pos {
  display: inline-flex;
  align-items: center;
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 600;
  background: rgba(31,79,217,.08);
  color: var(--c-royal);
  margin-bottom: 18px;
}

/* ── Options ─────────────────────────────────────────────── */
.option-list { display: flex; flex-direction: column; gap: 10px; }
.option-btn {
  width: 100%;
  text-align: left;
  padding: 14px 18px;
  border-radius: 12px;
  border: 2px solid var(--c-border);
  background: var(--c-surface);
  font-size: 14px;
  color: var(--c-text);
  cursor: pointer;
  transition: border-color .15s, background .15s, color .15s;
  line-height: 1.4;
}
.option-btn:hover:not([disabled]) { border-color: var(--c-royal); background: rgba(31,79,217,.04); }
.option-btn.correct { border-color: var(--c-success); background: rgba(16,185,129,.08); color: var(--c-success); font-weight: 600; }
.option-btn.wrong   { border-color: var(--c-danger);  background: rgba(239,68,68,.08);  color: var(--c-danger);  }
.option-btn[disabled] { cursor: default; }

.quiz-feedback {
  display: none;
  margin-top: 14px;
  padding: 10px 14px;
  border-radius: 10px;
  font-size: 13px;
  font-weight: 600;
}
.quiz-feedback.correct-fb { background: rgba(16,185,129,.10); color: var(--c-success); }
.quiz-feedback.wrong-fb   { background: rgba(239,68,68,.10);  color: var(--c-danger); }

/* ── Next button ────────────────────────────────────────── */
.btn-next {
  display: none;
  margin: 16px auto 0;
  padding: 11px 28px;
  border-radius: 12px;
  background: linear-gradient(135deg, var(--c-navy-a), var(--c-royal));
  color: white;
  font-size: 14px;
  font-weight: 700;
  border: none;
  cursor: pointer;
  align-items: center;
  gap: 8px;
  transition: opacity .15s;
}
.btn-next.show { display: inline-flex; }
.btn-next:hover { opacity: .88; }

/* ── Completion ──────────────────────────────────────────── */
.quiz-complete {
  display: none;
  text-align: center;
  background: var(--c-surface);
  border-radius: 20px;
  padding: 40px 28px;
  border: 1px solid var(--c-border);
  box-shadow: 0 1px 4px rgba(27,63,122,.06);
  max-width: 480px;
  margin: 0 auto;
}
.quiz-complete.show { display: block; }
.quiz-grade {
  font-size: 64px;
  font-weight: 900;
  margin-bottom: 6px;
  line-height: 1;
}
.grade-A { color: var(--c-success); }
.grade-B { color: #3B82F6; }
.grade-C { color: var(--c-warning); }
.grade-D { color: #F97316; }
.grade-F { color: var(--c-danger); }
.quiz-score-big { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
.quiz-score-sub { font-size: 13px; color: var(--c-muted); margin-bottom: 24px; }
.btn-retry {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 11px 24px;
  border-radius: 12px;
  font-size: 14px;
  font-weight: 700;
  background: var(--c-royal);
  color: white;
  border: none;
  cursor: pointer;
  text-decoration: none;
  transition: opacity .15s;
  margin: 0 6px;
}
.btn-retry:hover { opacity: .88; color: white; text-decoration: none; }
.btn-home-outline {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 10px 22px;
  border-radius: 12px;
  font-size: 14px;
  font-weight: 700;
  background: transparent;
  color: var(--c-royal);
  border: 2px solid var(--c-royal);
  text-decoration: none;
  transition: all .15s;
  margin: 0 6px;
}
.btn-home-outline:hover { background: rgba(31,79,217,.06); text-decoration: none; }

/* Empty state */
.quiz-empty {
  text-align: center;
  padding: 60px 20px;
  color: var(--c-muted);
  background: var(--c-surface);
  border-radius: 20px;
  border: 1px solid var(--c-border);
  max-width: 480px;
  margin: 0 auto;
}
.quiz-empty i { font-size: 52px; opacity: .2; display: block; margin-bottom: 16px; }
</style>
{% endblock custom_css %}

{% block content %}
<div class="quiz-page">

  <!-- Progress bar -->
  <div class="quiz-progress-wrap" id="quiz-prog-wrap">
    <div class="quiz-prog-bar-bg">
      <div class="quiz-prog-bar-fill" id="quiz-prog-bar" style="width:0%"></div>
    </div>
    <div class="quiz-score-label" id="quiz-score-label">0 / 0</div>
  </div>

  <!-- Quiz card -->
  <div class="quiz-card" id="quiz-card">
    <div class="quiz-q-label" id="quiz-q-label">What does this word mean?</div>
    <div class="quiz-word" id="q-word">Loading…</div>
    <div id="q-pos" class="quiz-pos" style="display:none"></div>
    <div class="option-list" id="option-list"></div>
    <div class="quiz-feedback" id="quiz-feedback"></div>
    <div style="text-align:center;">
      <button class="btn-next" id="btn-next" onclick="nextQuestion()">
        Next Question <i class="fas fa-arrow-right"></i>
      </button>
    </div>
  </div>

  <!-- Completion screen -->
  <div class="quiz-complete" id="quiz-complete">
    <div class="quiz-grade" id="comp-grade"></div>
    <div class="quiz-score-big" id="comp-score"></div>
    <div class="quiz-score-sub" id="comp-sub"></div>
    <div>
      <button class="btn-retry" onclick="startQuiz()"><i class="fas fa-redo"></i> Try Again</button>
      <a href="{% url 'vocabulary_flashcard' %}" class="btn-home-outline"><i class="fas fa-layer-group"></i> Study Flashcards</a>
    </div>
  </div>

</div>

<script id="vocab-data" type="application/json">{{ vocab_json|safe }}</script>
{% endblock %}

{% block custom_js %}
<script>
(function() {
  var rawEl = document.getElementById('vocab-data');
  if (!rawEl) return;
  var ALL_WORDS = JSON.parse(rawEl.textContent || '[]');

  if (ALL_WORDS.length < 4) {
    document.getElementById('quiz-card').innerHTML = '<div style="text-align:center;padding:40px;color:var(--c-muted)"><i class="fas fa-book-open" style="font-size:40px;opacity:.2;display:block;margin-bottom:12px;"></i><strong style="color:var(--c-text);display:block;margin-bottom:8px;">Not enough vocabulary yet</strong>You need at least 4 words to take a quiz. Ask your teacher to add more words!<br><a href="{% url 'vocabulary_home' %}" style="display:inline-flex;align-items:center;gap:8px;margin-top:16px;padding:10px 22px;border-radius:12px;background:var(--c-royal);color:white;font-weight:700;text-decoration:none;"><i class="fas fa-arrow-left"></i> Back to Vocabulary</a></div>';
    document.getElementById('quiz-prog-wrap').style.display = 'none';
    return;
  }

  var PROGRESS_URL = "{% url 'vocabulary_progress_update' %}";
  var CSRF = (document.cookie.match(/csrftoken=([^;]+)/) || [])[1] || '';

  var questions = [];
  var qIdx = 0;
  var score = 0;
  var answered = false;

  function shuffle(arr) {
    var a = arr.slice();
    for (var i = a.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var t = a[i]; a[i] = a[j]; a[j] = t;
    }
    return a;
  }

  function buildQuestions() {
    var words = shuffle(ALL_WORDS);
    questions = words.map(function(w) {
      var others = ALL_WORDS.filter(function(x) { return x.id !== w.id; });
      var distractors = shuffle(others).slice(0, 3).map(function(x) { return x.definition; });
      var opts = shuffle([w.definition].concat(distractors));
      // Fill-in-blank mode: use example_sentence if it contains the word
      var useFillBlank = false;
      var sentence = w.example_sentence || '';
      if (sentence && sentence.toLowerCase().indexOf(w.word.toLowerCase()) !== -1) {
        useFillBlank = (Math.random() > 0.5);
      }
      return { vocab: w, options: opts, correct: w.definition, useFillBlank: useFillBlank, sentence: sentence };
    });
    qIdx = 0;
    score = 0;
  }

  function loadQuestion() {
    answered = false;
    var q = questions[qIdx];
    var wordEl = document.getElementById('q-word');
    var labelEl = document.getElementById('quiz-q-label');
    if (q.useFillBlank && q.sentence) {
      var re = new RegExp(q.vocab.word.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi');
      var blanked = q.sentence.replace(re, '_____');
      wordEl.textContent = blanked;
      wordEl.style.fontSize = '22px';
      if (labelEl) labelEl.textContent = 'Which word completes the sentence?';
    } else {
      wordEl.textContent = q.vocab.word;
      wordEl.style.fontSize = '';
      if (labelEl) labelEl.textContent = 'What does this word mean?';
    }
    var posEl = document.getElementById('q-pos');
    if (!q.useFillBlank && q.vocab.part_of_speech) { posEl.textContent = q.vocab.part_of_speech; posEl.style.display = ''; }
    else { posEl.style.display = 'none'; }

    var listEl = document.getElementById('option-list');
    listEl.innerHTML = '';
    q.options.forEach(function(opt) {
      var btn = document.createElement('button');
      btn.className = 'option-btn';
      btn.textContent = opt;
      btn.onclick = function() { selectAnswer(opt, btn, q); };
      listEl.appendChild(btn);
    });

    document.getElementById('quiz-feedback').style.display = 'none';
    document.getElementById('quiz-feedback').className = 'quiz-feedback';
    document.getElementById('btn-next').classList.remove('show');
    updateProgress();
  }

  function selectAnswer(opt, btn, q) {
    if (answered) return;
    answered = true;
    var isCorrect = (opt === q.correct);

    // Disable all buttons
    document.querySelectorAll('.option-btn').forEach(function(b) {
      b.disabled = true;
      if (b.textContent === q.correct) b.classList.add('correct');
    });
    if (!isCorrect) btn.classList.add('wrong');

    var fb = document.getElementById('quiz-feedback');
    if (isCorrect) {
      score++;
      fb.className = 'quiz-feedback correct-fb';
      fb.textContent = '✓ Correct!';
    } else {
      fb.className = 'quiz-feedback wrong-fb';
      fb.textContent = '✗ The correct answer was: ' + q.correct;
    }
    fb.style.display = 'block';
    document.getElementById('btn-next').classList.add('show');

    // Update progress on server
    fetch(PROGRESS_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded', 'X-CSRFToken': CSRF },
      body: 'vocab_id=' + q.vocab.id + '&correct=' + (isCorrect ? '1' : '0'),
    }).catch(function() {});

    updateProgress();
  }

  function updateProgress() {
    var total = questions.length;
    var done = qIdx + (answered ? 1 : 0);
    var pct = total > 0 ? Math.round((done / total) * 100) : 0;
    document.getElementById('quiz-prog-bar').style.width = pct + '%';
    document.getElementById('quiz-score-label').textContent = score + ' / ' + done;
  }

  window.nextQuestion = function() {
    qIdx++;
    if (qIdx >= questions.length) {
      showComplete();
    } else {
      loadQuestion();
    }
  };

  function gradeFromPct(pct) {
    if (pct >= 90) return 'A';
    if (pct >= 75) return 'B';
    if (pct >= 60) return 'C';
    if (pct >= 45) return 'D';
    return 'F';
  }

  function showComplete() {
    document.getElementById('quiz-card').style.display = 'none';
    document.getElementById('quiz-prog-wrap').style.display = 'none';
    var comp = document.getElementById('quiz-complete');
    comp.classList.add('show');
    var total = questions.length;
    var pct = total > 0 ? Math.round((score / total) * 100) : 0;
    var grade = gradeFromPct(pct);
    var gradeEl = document.getElementById('comp-grade');
    gradeEl.textContent = grade;
    gradeEl.className = 'quiz-grade grade-' + grade;
    document.getElementById('comp-score').textContent = score + ' / ' + total + ' correct';
    document.getElementById('comp-sub').textContent = pct + '% accuracy — ' + (pct >= 80 ? 'Great job!' : pct >= 60 ? 'Keep practicing!' : 'Review and try again.');
  }

  window.startQuiz = function() {
    buildQuestions();
    document.getElementById('quiz-card').style.display = '';
    document.getElementById('quiz-prog-wrap').style.display = '';
    document.getElementById('quiz-complete').classList.remove('show');
    loadQuestion();
  };

  startQuiz();
})();
</script>
{% endblock %}
