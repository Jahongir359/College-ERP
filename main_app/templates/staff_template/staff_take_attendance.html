{% extends 'main_app/base.html' %}
{% load static %}
{% block page_title %}{{ page_title }}{% endblock %}
{% block content %}
<section class="content">
  <div class="container-fluid">
    <div class="row">
      <div class="col-md-10 offset-md-1">

        <div class="card card-dark">
          <div class="card-header">
            <h3 class="card-title"><i class="fas fa-clipboard-check mr-2"></i>{{ page_title }}</h3>
          </div>
          <div class="card-body">

            <div class="row">
              <!-- Course filter -->
              <div class="col-md-4">
                <div class="form-group">
                  <label><i class="fas fa-book mr-1"></i> Course / Program</label>
                  <select id="course_sel" class="form-control">
                    <option value="">— All Courses —</option>
                    {% for c in courses %}
                    <option value="{{ c.id }}">{{ c.name }}</option>
                    {% endfor %}
                  </select>
                </div>
              </div>
              <!-- Teacher filter -->
              <div class="col-md-4">
                <div class="form-group">
                  <label><i class="fas fa-chalkboard-teacher mr-1"></i> Teacher</label>
                  <select id="teacher_sel" class="form-control" disabled>
                    <option value="">— Select Course first —</option>
                  </select>
                </div>
              </div>
              <!-- Group -->
              <div class="col-md-4">
                <div class="form-group">
                  <label><i class="fas fa-layer-group mr-1"></i> Group <span class="text-danger">*</span></label>
                  <select id="group" class="form-control" disabled>
                    <option value="">— Select Teacher first —</option>
                  </select>
                </div>
              </div>
            </div>

            <div class="row">
              <div class="col-md-4">
                <div class="form-group">
                  <label><i class="fas fa-calendar-day mr-1"></i> Date</label>
                  <input type="date" id="attendance_date" class="form-control"
                         value="{{ today }}" max="{{ today }}">
                </div>
              </div>
              <div class="col-md-2 d-flex align-items-end">
                <div class="form-group w-100">
                  <button type="button" id="fetch_btn" class="btn btn-primary btn-block" disabled>
                    <i class="fas fa-users mr-1"></i> Load
                  </button>
                </div>
              </div>
            </div>

          </div><!-- /.card-body -->
        </div>

        <!-- Student roster -->
        <div id="roster_card" class="card card-dark" style="display:none;">
          <div class="card-header d-flex justify-content-between align-items-center flex-wrap">
            <h5 class="card-title mb-0" id="roster_title">Mark Attendance</h5>
            <div class="mt-1">
              <button type="button" class="btn btn-sm btn-success mr-1" onclick="markAll(1)">All Present</button>
              <button type="button" class="btn btn-sm btn-warning mr-1" onclick="markAll(2)">All Late</button>
              <button type="button" class="btn btn-sm btn-danger" onclick="markAll(0)">All Absent</button>
            </div>
          </div>

          <div class="card-body p-0">
            <div id="student_list" class="table-responsive">
              <table class="table table-hover mb-0" id="roster_table">
                <thead class="thead-dark">
                  <tr>
                    <th style="width:50%">Student</th>
                    <th>
                      <span class="status-btn-header d-flex gap-2">
                        <span class="badge badge-success px-3 py-2">Present</span>
                        <span class="badge badge-warning px-3 py-2">Late</span>
                        <span class="badge badge-danger px-3 py-2">Absent</span>
                      </span>
                    </th>
                  </tr>
                </thead>
                <tbody id="roster_tbody"></tbody>
              </table>
            </div>
          </div>

          <div class="card-footer">
            <div id="att_summary" class="mb-2">
              <span class="badge badge-success p-2 mr-2">Present: <strong id="cnt_p">0</strong></span>
              <span class="badge badge-warning p-2 mr-2">Late: <strong id="cnt_l">0</strong></span>
              <span class="badge badge-danger p-2">Absent: <strong id="cnt_a">0</strong></span>
            </div>
            <button type="button" id="save_btn" class="btn btn-success btn-block">
              <i class="fas fa-save mr-1"></i> Save Attendance
            </button>
            <div id="save_msg" class="mt-2"></div>
          </div>
        </div>

      </div>
    </div>
  </div>
</section>
{% endblock %}

{% block custom_js %}
<style>
.status-btn-group { display: flex; gap: 6px; }
.status-btn {
  border: 2px solid transparent;
  border-radius: 6px;
  padding: 4px 14px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all .15s;
  background: #f0f0f0;
  color: #555;
}
.status-btn.active-present { background: #28a745; color: #fff; border-color: #28a745; }
.status-btn.active-late    { background: #ffc107; color: #333; border-color: #ffc107; }
.status-btn.active-absent  { background: #dc3545; color: #fff; border-color: #dc3545; }
.status-btn:hover          { opacity: .85; }
.gap-2 { gap: 8px; }
</style>
<script>
const CSRF = document.cookie.match(/csrftoken=([^;]+)/)?.[1] ?? '';
const STATUS_CLASS = {0: 'active-absent', 1: 'active-present', 2: 'active-late'};

function updateSummary() {
  let p = 0, l = 0, a = 0;
  document.querySelectorAll('#roster_tbody tr').forEach(r => {
    const v = parseInt(r.querySelector('input.student-status').value);
    if (v === 1) p++; else if (v === 2) l++; else a++;
  });
  document.getElementById('cnt_p').textContent = p;
  document.getElementById('cnt_l').textContent = l;
  document.getElementById('cnt_a').textContent = a;
}

function setStatus(row, status) {
  row.querySelector('input.student-status').value = status;
  row.querySelectorAll('.status-btn').forEach(b => b.classList.remove('active-present','active-late','active-absent'));
  row.querySelector(`.status-btn[data-status="${status}"]`).classList.add(STATUS_CLASS[status]);
  updateSummary();
}

function markAll(status) {
  document.querySelectorAll('#roster_tbody tr').forEach(r => setStatus(r, status));
}

// ── Cascade: Course → Teacher ──────────────────────────────────────────
document.getElementById('course_sel').addEventListener('change', function () {
  const courseId = this.value;
  const teacherSel = document.getElementById('teacher_sel');
  const groupSel = document.getElementById('group');
  const fetchBtn = document.getElementById('fetch_btn');

  teacherSel.innerHTML = '<option value="">— Loading… —</option>';
  teacherSel.disabled = true;
  groupSel.innerHTML = '<option value="">— Select Teacher first —</option>';
  groupSel.disabled = true;
  fetchBtn.disabled = true;

  if (!courseId) {
    teacherSel.innerHTML = '<option value="">— Select Course first —</option>';
    return;
  }

  fetch("{% url 'staff_get_teachers_for_course' %}", {
    method: 'POST',
    headers: { 'X-CSRFToken': CSRF, 'Content-Type': 'application/x-www-form-urlencoded' },
    body: new URLSearchParams({ course_id: courseId })
  })
  .then(r => r.json())
  .then(d => {
    if (!d.teachers.length) {
      teacherSel.innerHTML = '<option value="">No teachers for this course</option>';
      return;
    }
    teacherSel.innerHTML = '<option value="">— All Teachers —</option>' +
      d.teachers.map(t => `<option value="${t.id}">${t.name}</option>`).join('');
    teacherSel.disabled = false;
    // Also load all groups for this course
    loadGroups(null, courseId);
  })
  .catch(() => { teacherSel.innerHTML = '<option value="">Error loading teachers</option>'; });
});

// ── Cascade: Teacher → Group ───────────────────────────────────────────
document.getElementById('teacher_sel').addEventListener('change', function () {
  const teacherId = this.value;
  const courseId  = document.getElementById('course_sel').value;
  loadGroups(teacherId || null, teacherId ? null : courseId);
});

function loadGroups(teacherId, courseId) {
  const groupSel = document.getElementById('group');
  const fetchBtn = document.getElementById('fetch_btn');
  groupSel.innerHTML = '<option value="">— Loading… —</option>';
  groupSel.disabled = true;
  fetchBtn.disabled = true;

  const params = {};
  if (teacherId) params.teacher_id = teacherId;
  else if (courseId) params.course_id = courseId;

  fetch("{% url 'staff_get_groups_for_teacher' %}", {
    method: 'POST',
    headers: { 'X-CSRFToken': CSRF, 'Content-Type': 'application/x-www-form-urlencoded' },
    body: new URLSearchParams(params)
  })
  .then(r => r.json())
  .then(d => {
    if (!d.groups.length) {
      groupSel.innerHTML = '<option value="">No groups found</option>';
      return;
    }
    groupSel.innerHTML = '<option value="">— Select a group —</option>' +
      d.groups.map(g => `<option value="${g.id}">${g.name}</option>`).join('');
    groupSel.disabled = false;
  })
  .catch(() => { groupSel.innerHTML = '<option value="">Error loading groups</option>'; });
}

document.getElementById('group').addEventListener('change', function () {
  document.getElementById('fetch_btn').disabled = !this.value;
});

// ── Load Students ──────────────────────────────────────────────────────
document.getElementById('fetch_btn').addEventListener('click', function () {
  const group   = document.getElementById('group').value;
  const attDate = document.getElementById('attendance_date').value;
  if (!group)   { alert('Please select a group first.'); return; }
  if (!attDate) { alert('Please select a date.'); return; }

  this.disabled = true;
  this.innerHTML = '<i class="fas fa-spinner fa-spin mr-1"></i> Loading…';

  fetch("{% url 'get_students' %}", {
    method: 'POST',
    headers: { 'X-CSRFToken': CSRF, 'Content-Type': 'application/x-www-form-urlencoded' },
    body: new URLSearchParams({ group })
  })
  .then(r => r.json())
  .then(data => {
    const arr = typeof data === 'string' ? JSON.parse(data) : data;
    document.getElementById('fetch_btn').disabled = false;
    document.getElementById('fetch_btn').innerHTML = '<i class="fas fa-users mr-1"></i> Load';

    if (!arr.length) { alert('No enrolled students in this group.'); return; }

    document.getElementById('roster_tbody').innerHTML = arr.map(s => `
      <tr data-id="${s.id}">
        <td class="align-middle font-weight-bold">${s.name}</td>
        <td>
          <div class="status-btn-group">
            <button type="button" class="status-btn active-present" data-status="1" onclick="setStatus(this.closest('tr'),1)">Present</button>
            <button type="button" class="status-btn" data-status="2" onclick="setStatus(this.closest('tr'),2)">Late</button>
            <button type="button" class="status-btn" data-status="0" onclick="setStatus(this.closest('tr'),0)">Absent</button>
          </div>
          <input type="hidden" class="student-status" value="1">
        </td>
      </tr>`).join('');

    const grpOpt = document.getElementById('group').selectedOptions[0].text;
    document.getElementById('roster_title').textContent = `${grpOpt} · ${attDate} — ${arr.length} students`;
    document.getElementById('roster_card').style.display = 'block';
    document.getElementById('save_btn').style.display = '';
    document.getElementById('save_msg').innerHTML = '';
    updateSummary();
  })
  .catch(() => {
    document.getElementById('fetch_btn').disabled = false;
    document.getElementById('fetch_btn').innerHTML = '<i class="fas fa-users mr-1"></i> Load';
    alert('Error loading students.');
  });
});

// ── Save ───────────────────────────────────────────────────────────────
document.getElementById('save_btn').addEventListener('click', function () {
  const group   = document.getElementById('group').value;
  const attDate = document.getElementById('attendance_date').value;
  const rows    = document.querySelectorAll('#roster_tbody tr');
  if (!rows.length) return;

  const student_ids = JSON.stringify(
    Array.from(rows).map(r => ({
      id:     parseInt(r.dataset.id),
      status: parseInt(r.querySelector('input.student-status').value),
    }))
  );

  this.disabled = true;
  this.innerHTML = '<i class="fas fa-spinner fa-spin mr-1"></i> Saving…';

  fetch("{% url 'save_attendance' %}", {
    method: 'POST',
    headers: { 'X-CSRFToken': CSRF, 'Content-Type': 'application/x-www-form-urlencoded' },
    body: new URLSearchParams({ group, date: attDate, student_ids })
  })
  .then(r => r.text())
  .then(resp => {
    if (resp === 'OK') {
      document.getElementById('save_msg').innerHTML =
        '<div class="alert alert-success mb-0"><i class="fas fa-check-circle mr-1"></i> Attendance saved! Students have been notified.</div>';
      document.getElementById('save_btn').style.display = 'none';
    } else {
      document.getElementById('save_msg').innerHTML =
        '<div class="alert alert-danger mb-0">Error saving attendance. Please try again.</div>';
      this.disabled = false;
      this.innerHTML = '<i class="fas fa-save mr-1"></i> Save Attendance';
    }
  })
  .catch(() => {
    document.getElementById('save_msg').innerHTML =
      '<div class="alert alert-danger mb-0">Network error.</div>';
    this.disabled = false;
    this.innerHTML = '<i class="fas fa-save mr-1"></i> Save Attendance';
  });
});
</script>
{% endblock %}
