{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>ICEBERG — Sign In</title>
  <link rel="shortcut icon" href="{% static 'image/favicon1.ico' %}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      -webkit-font-smoothing: antialiased;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #F4F7FC;
      color: #0C1F45;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 20px 40px;
    }

    /* ── Logo ── */
    .logo-wrap {
      text-align: center;
      margin-bottom: 28px;
      animation: fadeUp .45s ease both;
    }
    .logo-wrap img {
      width: 220px;
      max-width: 68vw;
      height: auto;
      display: block;
      margin: 0 auto;
    }

    /* ── Card ── */
    .card {
      width: 100%;
      max-width: 400px;
      background: #fff;
      border-radius: 20px;
      padding: 36px 32px 32px;
      box-shadow:
        0 2px 6px rgba(12,31,69,.06),
        0 8px 28px rgba(12,31,69,.08);
      animation: fadeUp .5s ease .07s both;
    }

    .card-title {
      font-size: 22px;
      font-weight: 700;
      color: #0C1F45;
      margin-bottom: 3px;
      letter-spacing: -.2px;
    }
    .card-sub {
      font-size: 14px;
      color: #94A3B8;
      margin-bottom: 28px;
    }

    /* ── Alerts ── */
    .alert {
      padding: 11px 14px;
      border-radius: 10px;
      font-size: 13px;
      margin-bottom: 20px;
      display: flex;
      align-items: flex-start;
      gap: 8px;
      line-height: 1.45;
      border: 1px solid transparent;
    }
    .alert svg { flex-shrink: 0; width: 14px; height: 14px; margin-top: 1px; }
    .alert-danger  { background: #FEF2F2; color: #DC2626; border-color: #FECACA; }
    .alert-success { background: #F0FDF4; color: #16A34A; border-color: #BBF7D0; }
    .alert-warning { background: #FFFBEB; color: #D97706; border-color: #FDE68A; }
    .alert-info    { background: #EFF6FF; color: #2563EB; border-color: #BFDBFE; }

    /* ── Fields ── */
    .field { margin-bottom: 18px; }
    .field-label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #334155;
      margin-bottom: 7px;
    }
    .input-wrap {
      position: relative;
      display: flex;
      align-items: center;
    }
    .input-wrap input {
      width: 100%;
      height: 50px;
      padding: 0 44px 0 16px;
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      color: #0C1F45;
      background: #fff;
      border: 1.5px solid #E2E8F0;
      border-radius: 12px;
      outline: none;
      transition: border-color .18s, box-shadow .18s;
    }
    .input-wrap input::placeholder { color: #CBD5E1; }
    .input-wrap input:focus {
      border-color: #06B6D4;
      box-shadow: 0 0 0 3px rgba(6,182,212,.12);
    }

    /* Password toggle */
    .pw-btn {
      position: absolute;
      right: 10px;
      width: 30px;
      height: 30px;
      background: none;
      border: none;
      cursor: pointer;
      color: #CBD5E1;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      transition: color .15s;
    }
    .pw-btn:hover { color: #94A3B8; }

    /* ── Button ── */
    .btn-signin {
      width: 100%;
      height: 52px;
      margin-top: 8px;
      border: none;
      border-radius: 12px;
      background: #1B4FD8;
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: .1px;
      cursor: pointer;
      transition: background .15s, transform .1s;
    }
    .btn-signin:hover  { background: #1741BB; }
    .btn-signin:active { background: #1339A8; transform: translateY(1px); }

    /* ── Footer ── */
    .footer {
      margin-top: 28px;
      font-size: 12px;
      color: #94A3B8;
      animation: fadeUp .5s ease .14s both;
    }

    /* ── Animation ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Responsive ── */
    @media (max-width: 420px) {
      .card { padding: 28px 22px 26px; border-radius: 16px; }
      .logo-wrap img { width: 180px; }
    }

    @media (prefers-reduced-motion: reduce) {
      .logo-wrap, .card, .footer { animation: none; }
      * { transition: none !important; }
    }
  </style>
</head>
<body>

  <!-- Logo -->
  <div class="logo-wrap">
    <img src="{% static 'dist/img/logo.png' %}" alt="ICEBERG Study Center">
  </div>

  <!-- Card -->
  <div class="card">
    <h1 class="card-title">Welcome back</h1>
    <p class="card-sub">Sign in to continue</p>

    {% if messages %}
      {% for message in messages %}
        <div class="alert alert-{{ message.tags|default:'info' }}">
          <svg viewBox="0 0 20 20" fill="currentColor">
            {% if message.tags == 'success' %}
              <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.7-9.3l-4 4a1 1 0 01-1.4 0l-2-2a1 1 0 011.4-1.4L9 10.6l3.3-3.3a1 1 0 011.4 1.4z" clip-rule="evenodd"/>
            {% elif message.tags == 'danger' or message.tags == 'error' %}
              <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM9 7a1 1 0 112 0v4a1 1 0 11-2 0V7zm1 8a1 1 0 100-2 1 1 0 000 2z" clip-rule="evenodd"/>
            {% elif message.tags == 'warning' %}
              <path fill-rule="evenodd" d="M8.3 2.6c.8-1.5 2.9-1.5 3.7 0l6.5 12a2 2 0 01-1.8 3H3.7a2 2 0 01-1.9-3l6.5-12zM10 7a1 1 0 011 1v4a1 1 0 11-2 0V8a1 1 0 011-1zm0 9a1 1 0 100-2 1 1 0 000 2z" clip-rule="evenodd"/>
            {% else %}
              <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z" clip-rule="evenodd"/>
            {% endif %}
          </svg>
          <span>{{ message }}</span>
        </div>
      {% endfor %}
    {% endif %}

    <form method="post" action="{% url 'user_login' %}" autocomplete="on" novalidate>
      {% csrf_token %}
      {% if next %}<input type="hidden" name="next" value="{{ next }}">{% endif %}

      <div class="field">
        <label class="field-label" for="id_identifier">Your ID</label>
        <div class="input-wrap">
          <input type="text" id="id_identifier" name="identifier"
                 placeholder="IC04821"
                 autocomplete="username" required autofocus
                 spellcheck="false" autocorrect="off" autocapitalize="characters">
        </div>
      </div>

      <div class="field">
        <label class="field-label" for="id_password">Password</label>
        <div class="input-wrap">
          <input type="password" id="id_password" name="password"
                 placeholder="••••••••"
                 autocomplete="current-password" required>
          <button type="button" class="pw-btn" id="pw-toggle" aria-label="Show or hide password">
            <svg id="eye-ico" viewBox="0 0 20 20" fill="currentColor" width="16" height="16">
              <path d="M10 12a2 2 0 100-4 2 2 0 000 4z"/>
              <path fill-rule="evenodd" d="M.5 10C1.7 5.9 5.5 3 10 3s8.3 2.9 9.5 7c-1.2 4.1-5 7-9.5 7S1.7 14.1.5 10zM14 10a4 4 0 11-8 0 4 4 0 018 0z" clip-rule="evenodd"/>
            </svg>
          </button>
        </div>
      </div>

      <button type="submit" class="btn-signin">Sign In</button>
    </form>
  </div>

  <p class="footer">&copy; {% now "Y" %} Iceberg Study Center</p>

  <script>
  /* Password toggle */
  (function () {
    var btn = document.getElementById('pw-toggle');
    var inp = document.getElementById('id_password');
    var ico = document.getElementById('eye-ico');
    var EYE     = '<path d="M10 12a2 2 0 100-4 2 2 0 000 4z"/><path fill-rule="evenodd" d="M.5 10C1.7 5.9 5.5 3 10 3s8.3 2.9 9.5 7c-1.2 4.1-5 7-9.5 7S1.7 14.1.5 10zM14 10a4 4 0 11-8 0 4 4 0 018 0z" clip-rule="evenodd"/>';
    var EYE_OFF = '<path fill-rule="evenodd" d="M3.707 2.293a1 1 0 00-1.414 1.414l14 14a1 1 0 001.414-1.414l-1.473-1.473A10.014 10.014 0 0019.542 10C18.268 5.943 14.478 3 10 3a9.958 9.958 0 00-4.512 1.074l-1.78-1.781zm4.261 4.26l1.514 1.515a2.003 2.003 0 012.45 2.45l1.514 1.515a4 4 0 00-5.478-5.48zM8.88 12.88l-3.29-3.29A3.98 3.98 0 014 10c0 2.21 1.79 4 4 4 .736 0 1.424-.207 2.015-.555l-1.136-1.136z" clip-rule="evenodd"/><path d="M12.454 16.697L9.75 13.992a4 4 0 01-3.742-3.741L2.335 6.578A9.98 9.98 0 00.458 10c1.274 4.057 5.065 7 9.542 7 .847 0 1.669-.105 2.454-.303z"/>';
    var on = false;
    if (btn && inp) {
      btn.addEventListener('click', function () {
        on = !on;
        inp.type = on ? 'text' : 'password';
        ico.innerHTML = on ? EYE_OFF : EYE;
      });
    }
  })();

  /* Auto-uppercase IC / TC prefix */
  (function () {
    var inp = document.getElementById('id_identifier');
    if (!inp) return;
    inp.addEventListener('input', function () {
      var v = inp.value, p = inp.selectionStart;
      var u = v.slice(0, 2).toUpperCase() + v.slice(2);
      if (u !== v) { inp.value = u; try { inp.setSelectionRange(p, p); } catch (e) {} }
    });
  })();
  </script>

</body>
</html>
